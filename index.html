<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malcolm Live Status</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f0f;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 500px;
        }
        header {
            text-align: center;
            margin-bottom: 30px;
        }
        h1 {
            font-size: 1.8rem;
            margin-bottom: 5px;
        }
        .subtitle {
            color: #888;
            font-size: 0.9rem;
        }
        .status-card {
            background: #1a1a1a;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 16px;
            border: 1px solid #2a2a2a;
        }
        .status-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }
        .status-dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        .status-dot.online {
            background: #22c55e;
            box-shadow: 0 0 20px #22c55e66;
        }
        .status-dot.idle {
            background: #eab308;
            box-shadow: 0 0 20px #eab30866;
        }
        .status-dot.offline {
            background: #ef4444;
            animation: none;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        .status-text {
            font-size: 1.4rem;
            font-weight: 600;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #2a2a2a;
        }
        .info-row:last-child {
            border-bottom: none;
        }
        .info-label {
            color: #888;
            font-size: 0.9rem;
        }
        .info-value {
            font-weight: 500;
            font-family: 'SF Mono', monospace;
        }
        .uptime-bar {
            background: #2a2a2a;
            height: 4px;
            border-radius: 2px;
            margin-top: 8px;
            overflow: hidden;
        }
        .uptime-fill {
            background: linear-gradient(90deg, #22c55e, #3b82f6);
            height: 100%;
            width: 75%;
            border-radius: 2px;
        }
        .refresh-info {
            text-align: center;
            color: #666;
            font-size: 0.8rem;
            margin-top: 20px;
        }
        .error-message {
            background: #ef444422;
            border: 1px solid #ef4444;
            color: #ef4444;
            padding: 16px;
            border-radius: 12px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🖥️ Malcolm</h1>
            <p class="subtitle">Windows PC Agent • Kim's Assistant</p>
        </header>

        <div id="status-container">
            <div class="status-card">
                <div class="status-header">
                    <div class="status-dot online" id="status-dot"></div>
                    <div class="status-text" id="status-text">Loading...</div>
                </div>

                <div class="info-row">
                    <span class="info-label">Activity</span>
                    <span class="info-value" id="activity">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Model</span>
                    <span class="info-value" id="model">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Last Seen</span>
                    <span class="info-value" id="last-seen">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">System Uptime</span>
                    <span class="info-value" id="uptime">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Timezone</span>
                    <span class="info-value" id="timezone">-</span>
                </div>
            </div>

            <p class="refresh-info">Auto-refreshes every 10 seconds</p>
        </div>
    </div>

    <script>
        let lastData = null;

        async function fetchStatus() {
            try {
                const response = await fetch('./status.json?t=' + Date.now());
                if (!response.ok) throw new Error('Failed to fetch');
                const data = await response.json();
                
                if (JSON.stringify(data) !== JSON.stringify(lastData)) {
                    updateUI(data);
                    lastData = data;
                }
            } catch (error) {
                showError('Cannot connect to status server');
            }
        }

        function updateUI(data) {
            const now = new Date();
            const lastSeen = new Date(data.lastSeen);
            const idleMinutes = (now - lastSeen) / 60000;

            const dot = document.getElementById('status-dot');
            const statusText = document.getElementById('status-text');

            dot.className = 'status-dot';
            if (idleMinutes < 2) {
                dot.classList.add('online');
                statusText.textContent = 'ONLINE';
            } else if (idleMinutes < 10) {
                dot.classList.add('idle');
                statusText.textContent = 'IDLE';
            } else {
                dot.classList.add('offline');
                statusText.textContent = 'OFFLINE';
            }

            document.getElementById('activity').textContent = data.activity || 'Unknown';
            document.getElementById('model').textContent = (data.model || 'Unknown').split('/').pop();
            document.getElementById('last-seen').textContent = data.lastSeenDisplay || '-';
            document.getElementById('uptime').textContent = data.uptime || '-';
            document.getElementById('timezone').textContent = data.timezone || 'Asia/Manila';
        }

        function showError(message) {
            document.getElementById('status-container').innerHTML = 
                `<div class="error-message">${message}</div>`;
        }

        // Initial load
        fetchStatus();
        // Refresh every 10 seconds
        setInterval(fetchStatus, 10000);
    </script>
</body>
</html>
